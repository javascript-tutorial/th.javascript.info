<!doctype html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.11/lodash.js"></script>

ฟังก์ชัน <code>handler</code> ถูกเรียกจาก input นี้:
<br>
<input id="input1" placeholder="พิมพ์ตรงนี้">

<p>

ฟังก์ชันที่ debounce แล้ว <code>debounce(handler, 1000)</code> ถูกเรียกจาก input นี้:
<br>
<input id="input2" placeholder="พิมพ์ตรงนี้">

<p>
<button id="result"><code>handler</code> จะแสดงผลลัพธ์ตรงนี้</button>

<script>
  function handler(event) {
    result.innerHTML = event.target.value;
  }

  input1.oninput = handler;
  input2.oninput = _.debounce(handler, 1000);
</script>
